<body>
<div id="app"></div>

<script>
// ============================================================
// Setback — trade-universal AI permit roadmap tool
// Prototype: full funnel (intake -> teaser -> paywall -> reveal
// -> outcome report). Checkout below is a clearly-labeled DEMO —
// wiring real payment requires a live Stripe integration and a
// server-side proxy for the AI call (see AI-security notes in
// the planning doc; this file calls the model client-side only
// for prototype purposes, matching the original prototype).
// ============================================================

const TRADE_CHIPS = ['Pool','Deck','Roof','Solar','Fence','Addition','Garage/ADU','Other'];
const STARTERS = {
  Pool: 'Building a new inground pool, ',
  Deck: 'Building a new deck attached to the house, ',
  Roof: 'Full roof replacement, ',
  Solar: 'Installing rooftop solar panels, ',
  Fence: 'Installing a new fence, ',
  Addition: 'Adding a room addition to the house, ',
  'Garage/ADU': 'Building a new garage or accessory dwelling unit, ',
  Other: ''
};

let state = {
  project: null, result: null,
  theme: (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light'
};
let recognizer = null;
let listening = false;

async function fetchWithTimeout(url, options, ms){
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), ms);
  try {
    return await fetch(url, { ...options, signal: controller.signal });
  } finally {
    clearTimeout(id);
  }
}

// Point this at a deployed backend once one exists; localhost is right for
// testing with `node --env-file=.env server/index.js`.
const BACKEND_ORIGIN = 'http://localhost:8787';

// Fire-and-forget analytics — never blocks the UI, never surfaces an error
// to the user if the backend is unreachable. Real events now, not vapor.
function logEvent(name, properties){
  fetch(`${BACKEND_ORIGIN}/api/event`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, properties })
  }).catch(() => {});
}

const MIC_ICON = `<svg aria-hidden="true" width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a2 2 0 0 0-2 2v5a2 2 0 1 0 4 0V3a2 2 0 0 0-2-2z"/><path d="M3.5 7a.5.5 0 0 1 .5.5V8a4 4 0 0 0 8 0v-.5a.5.5 0 0 1 1 0V8a5 5 0 0 1-4.5 4.975V14h1.5a.5.5 0 0 1 0 1h-4a.5.5 0 0 1 0-1H7v-1.025A5 5 0 0 1 3 8v-.5a.5.5 0 0 1 .5-.5z"/></svg>`;

// The mark: a stepped line — a setback boundary indenting from a property
// corner, the actual shape a setback line takes on a site plan.
const MARK_ICON = `<svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V9h6V4h10"/></svg>`;

const ICON = {
  building: `<svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 9h.01M15 9h.01M9 13h.01M15 13h.01M9 17h.01M15 17h.01"/></svg>`,
  flag: `<svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21V4m0 0h13l-2 4 2 4H4"/></svg>`,
  alert: `<svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4m0 4h.01M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/></svg>`,
  clock: `<svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>`,
  doc: `<svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h6"/></svg>`,
  loop: `<svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4v5h5M20 20v-5h-5M4 9a9 9 0 0 1 15-4l1 1M20 15a9 9 0 0 1-15 4l-1-1"/></svg>`,
  check: `<svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>`,
  edit: `<svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>`,
  x: `<svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>`
};

function swapOut(html){
  const out = document.getElementById('out');
  out.innerHTML = html;
  out.classList.remove('fadein'); void out.offsetWidth; out.classList.add('fadein');
  out.scrollIntoView({ behavior:'smooth', block:'start' });
  out.focus();
}
function demoBanner(){
  return state.isMock ? `<div class="demoflag" style="margin-bottom:10px;">Demo data — not a real answer to what you typed</div>` : '';
}

function micSupported(){
  return !!(window.SpeechRecognition || window.webkitSpeechRecognition);
}

function toggleMic(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  const ta = document.getElementById('f-desc');
  const btn = document.getElementById('micbtn');
  const status = document.getElementById('micstatus');
  if (!ta || !btn) return;

  if (listening){
    recognizer && recognizer.stop();
    return;
  }

  recognizer = new SR();
  recognizer.continuous = true;
  recognizer.interimResults = true;
  recognizer.lang = 'en-US';

  const baseText = ta.value.trim() ? ta.value.trim() + ' ' : '';
  let finalTranscript = '';

  recognizer.onstart = () => {
    listening = true;
    btn.classList.add('listening');
    status.textContent = 'Listening — tap the mic again to stop.';
  };
  recognizer.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++){
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) finalTranscript += t + ' ';
      else interim += t;
    }
    ta.value = (baseText + finalTranscript + interim).trim();
  };
  recognizer.onerror = (e) => {
    status.textContent = e.error === 'not-allowed'
      ? 'Microphone access was denied — you can still type your description.'
      : "Didn't catch that — tap the mic to try again, or just type.";
  };
  recognizer.onend = () => {
    listening = false;
    if (btn) btn.classList.remove('listening');
    if (status && status.textContent.startsWith('Listening')) status.textContent = '';
  };

function needsClarifying(desc){
  const d = desc.toLowerCase();
  return !(/\bnew\b/.test(d) || /\bexisting\b/.test(d) || /\breplac/.test(d));
}

// Basic sanity check, not real geocoding — catches the obvious cases
// ("asdfasdf") without pretending to validate real US jurisdictions.
// The real fix is the system-prompt instruction below, which lets the
// model itself refuse unrecognizable input instead of fabricating a roadmap.
function looksLikeRealLocation(loc){
  const trimmed = loc.trim();
  if (trimmed.length < 6) return false;
  if (!/[ ,]/.test(trimmed)) return false;
  if (/^(.)\1{3,}$/.test(trimmed.replace(/[ ,]/g, ''))) return false;
  return true;
}

// Real geocoding via Nominatim (OpenStreetMap) — free, no API key, and
// unlike the US Census geocoder it actually resolves place names like
// "Broward County, Florida" rather than requiring a street address.
// Fails open (doesn't block the user) on network/CORS/rate-limit issues,
// since a third-party outage shouldn't take down the core flow.
let lastVerifiedLoc = null;
async function verifyLocation(loc){
  if (loc === lastVerifiedLoc) return { ok: true };
  try {
    const res = await fetchWithTimeout(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(loc + ', USA')}&format=json&limit=1&countrycodes=us`, {}, 8000);
    if (!res.ok) return { ok: true, skipped: true };
    const data = await res.json();
    if (!data || data.length === 0){
      return { ok: false, message: `"${loc}" doesn't look like a real US city, county, or state — try a format like "Broward County, Florida."` };
    }
    lastVerifiedLoc = loc;
    return { ok: true };
  } catch (err){
    return { ok: true, skipped: true };
  }
}

async function handleGenerate(){
  const loc = document.getElementById('f-loc').value.trim();
  const desc = document.getElementById('f-desc').value.trim();
  document.getElementById('errbox').innerHTML = '';

  if (!loc || !desc){
    document.getElementById('errbox').innerHTML = `<div class="err">Add a location and a short project description so Setback can map the right jurisdictions.</div>`;
    return;
  }

  if (!looksLikeRealLocation(loc)){
    document.getElementById('errbox').innerHTML = `<div class="err">"${esc(loc)}" doesn't look like a real US city, county, or state — try a format like "Broward County, Florida."</div>`;
    return;
  }

  const btn = document.getElementById('go');
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span>Checking that location...`;
  const verified = await verifyLocation(loc);
  btn.disabled = false;
  btn.innerHTML = 'Show me my permits';
  if (!verified.ok){
    document.getElementById('errbox').innerHTML = `<div class="err">${esc(verified.message)}</div>`;
    return;
  }

  if (needsClarifying(desc) && state._clarifiedFor !== desc){
    document.getElementById('clarifyBox').innerHTML = `
      <div class="clarify">
        <p>Quick check — is this new construction, or replacing something existing?</p>
        <div class="clarifybtns">
          <button class="btn small" id="c-new">New</button>
          <button class="btn small secondary" id="c-existing">Replacing existing</button>
        </div>
      </div>`;
    document.getElementById('c-new').onclick = () => {
      const ta = document.getElementById('f-desc');
      ta.value += ' This is new construction.';
      state._clarifiedFor = ta.value.trim();
      document.getElementById('clarifyBox').innerHTML = '';
      handleGenerate();
    };
    document.getElementById('c-existing').onclick = () => {
      const ta = document.getElementById('f-desc');
      ta.value += ' This is replacing an existing structure.';
      state._clarifiedFor = ta.value.trim();
      document.getElementById('clarifyBox').innerHTML = '';
      handleGenerate();
    };
    return;
  }

  state.project = { location: loc, description: document.getElementById('f-desc').value.trim() };
  generateRoadmap();
}

// A full, non-streamed generation realistically runs ~30-45s, not instant —
// rotating status text keeps a long wait from reading as a stuck/broken page.
const LOOKUP_STAGES = [
  'Checking agencies for your area...',
  'Mapping jurisdiction rules...',
  'Cross-checking rejection risks...',
  'Drafting your permit narrative...',
  'Almost done...'
];

async function generateRoadmap(){
  const btn = document.getElementById('go');
  btn.disabled = true;
  let stageIndex = 0;
  btn.innerHTML = `<span class="spinner"></span>${LOOKUP_STAGES[0]}`;
  const stageTimer = setInterval(() => {
    stageIndex = Math.min(stageIndex + 1, LOOKUP_STAGES.length - 1);
    btn.innerHTML = `<span class="spinner"></span>${LOOKUP_STAGES[stageIndex]}`;
  }, 7000);

  try {
    const res = await fetchWithTimeout(`${BACKEND_ORIGIN}/api/roadmap`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ location: state.project.location, description: state.project.description })
    }, 70000);
    if (!res.ok) throw new Error(`Backend returned ${res.status}`);
    const { provider, result } = await res.json();
    if (result.unrecognized){
      document.getElementById('errbox').innerHTML = `<div class="err">${esc(result.message || "We couldn't identify that location or project — try again with a real US city, county, or state.")}</div>`;
      return;
    }
    state.result = result;
    state.isMock = false;
    persistProject(provider);
    renderTeaser();
  } catch (err){
    console.error('Setback: roadmap generation failed —', err);
    document.getElementById('errbox').innerHTML = `<div class="err">Something interrupted the engine: ${String(err)}. Is the backend running? (node --env-file=.env server/index.js) Falling back to demo data below for now.</div>`;
    state.result = mockResult();
    state.isMock = true;
    renderTeaser();
  } finally {
    clearInterval(stageTimer);
    btn.disabled = false;
    btn.innerHTML = 'Show me my permits';
  }
}

function esc(s){ return String(s||'').replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

// Mirrors the backend's own classifyTrade keyword match (server/index.js) —
// /api/roadmap doesn't echo the server-computed trade back to the client, so
// this is recomputed here purely to fill the required `trade` field on
// POST /api/projects. Keep the keyword lists in sync if either side changes.
const TRADE_KEYWORDS = {
  pool: ['pool', 'spa', 'hot tub'],
  deck: ['deck'],
  roof: ['roof', 'shingle'],
  solar: ['solar', 'photovoltaic', ' pv '],
  fence: ['fence', 'fencing'],
  addition: ['addition', 'room addition', 'extension'],
  'garage/adu': ['garage', 'adu', 'accessory dwelling']
};
function classifyTrade(description){
  const d = ` ${description.toLowerCase()} `;
  for (const [trade, keywords] of Object.entries(TRADE_KEYWORDS)){
    if (keywords.some(k => d.includes(k))) return trade;
  }
  return 'other';
}

// Fire-and-forget, same posture as logEvent — persistence is additive, never
// a dependency of the core funnel succeeding, so failures just log and move on.
function persistProject(provider){
  fetchWithTimeout(`${BACKEND_ORIGIN}/api/projects`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      location: state.project.location,
      description: state.project.description,
      trade: classifyTrade(state.project.description),
      provider,
      agencies: state.result.agencies,
      flags: state.result.flags,
      risks: state.result.risks,
      timeline: state.result.timeline,
      timelineNote: state.result.timelineNote,
      narrative: state.result.narrative
    })
  }, 8000).then(res => {
    if (!res.ok) throw new Error(`Backend returned ${res.status}`);
    return res.json();
  }).then(({ id }) => { state.project.id = id; })
    .catch(err => console.error('Setback: project persistence failed —', err));
}

      ${(projects||[]).length ? projects.map(p => `
        <div class="agency">
          <b><a href="setback-app.html?project=${encodeURIComponent(p.id)}">${esc(p.location)} — ${esc(p.trade)}</a></b>
          <p>${esc(new Date(p.createdAt).toLocaleDateString())}</p>
        </div>
      `).join('') : `<p style="color:var(--ink-soft);font-size:13px;">No saved roadmaps yet.</p>`}
    </div>
  `;
  document.getElementById('themetoggle').onclick = toggleTheme;
}

async function handleVerifyReturn(token){
  try {
    const res = await fetchWithTimeout(`${BACKEND_ORIGIN}/api/auth/verify?token=${encodeURIComponent(token)}`, {}, 8000);
    if (!res.ok){
      const body = await res.json().catch(() => ({}));
      render();
      document.getElementById('errbox').innerHTML = `<div class="err">${esc(body.error || "That access link didn't work — it may be expired or already used.")}</div>`;
      return;
    }
    const { sessionToken, projects } = await res.json();
    localStorage.setItem('setback_session', sessionToken);
    renderProjectList(projects);
  } catch (err){
    console.error('Setback: magic-link verification failed —', err);
    render();
    document.getElementById('errbox').innerHTML = `<div class="err">Couldn't verify that link — is the backend running?</div>`;
  }
}

async function init(){
  const params = new URLSearchParams(location.search);
  const verifyToken = params.get('verify');
  if (verifyToken){
    await handleVerifyReturn(verifyToken);
    return;
  }

  const projectId = params.get('project');
  if (projectId){
    try {
      const res = await fetchWithTimeout(`${BACKEND_ORIGIN}/api/projects/${encodeURIComponent(projectId)}`, {}, 8000);
      if (res.ok){
        const project = await res.json();
        state.project = { id: project.id, location: project.location, description: project.description };
        state.result = {
          agencies: project.agencies, flags: project.flags, risks: project.risks,
          timeline: project.timeline, timelineNote: project.timelineNote, narrative: project.narrative
        };
        state.isMock = false;
        render({ hideIntake: true });
        renderFull();
        return;
      }
      render();
      if (res.status === 404){
        document.getElementById('errbox').innerHTML = `<div class="err">That saved roadmap link didn't work — it may have been removed. You can generate a new one below.</div>`;
      }
      return;
    } catch (err){
      console.error('Setback: loading saved project failed —', err);
      render();
      return;
    }
  }

  render();
}

init();
</script>
</body>
</html>
