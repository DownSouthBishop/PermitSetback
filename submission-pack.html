<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>City Submission Pack — Setback</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="shared.css">
<style>
  body{ background:#fff; }
  .wrap{ max-width:760px; padding:0; }
  @media print{
    .screenOnly{ display:none !important; }
    body{ font-size:12pt; }
    .section{ break-inside:avoid; }
    .cover{ break-after:page; }
  }
  .cover{
    background:var(--ink); color:#fff; padding:48px; display:flex; flex-direction:column; gap:10px;
  }
  .cover .kicker{ font-size:12px; text-transform:uppercase; letter-spacing:.08em; opacity:.75; }
  .cover .title{ font-size:30px; font-weight:800; letter-spacing:-0.02em; }
  .cover .projline{ font-size:15px; opacity:.85; }
  .body-pad{ padding:0 48px 48px; }
  .section{ margin-top:32px; }
  .section h2{ font-size:14px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); margin:0 0 12px; padding-bottom:8px; border-bottom:2px solid var(--line); }
  .section p{ font-size:14.5px; line-height:1.6; }
  .footerline{ text-align:center; font-size:11px; color:var(--ink-soft); margin-top:40px; padding-top:14px; border-top:1px solid var(--line); }
  .honesty{ font-size:12px; color:var(--ink-soft); border-top:1px solid var(--line); margin-top:32px; padding-top:14px; }
  .printbtn{ position:fixed; top:16px; right:16px; }
</style>
</head>
<body>
<div class="wrap" id="app">
  <p style="padding:40px 48px;">Loading your City Submission Pack&hellip;</p>
</div>
<button class="btn printbtn screenOnly" id="printBtn" style="width:auto;padding:10px 18px;">Print / Save as PDF</button>

<script type="module">
import { esc, fetchWithTimeout, BACKEND_ORIGIN, tradeLabel, cityOf, logEvent } from './modules/shared.js';

const params = new URLSearchParams(location.search);
const projectId = params.get('id');
const app = document.getElementById('app');

function errorState(message) {
  app.innerHTML = `<p style="padding:40px 48px;">${esc(message)}</p>`;
  document.getElementById('printBtn').style.display = 'none';
}

function docSection(title, doc) {
  if (!doc) return '';
  return `<div class="section"><h2>${esc(title)}</h2><p style="white-space:pre-wrap;">${esc(doc.content)}</p></div>`;
}

async function load() {
  if (!projectId) { errorState('No project specified.'); return; }

  let project;
  try {
    const res = await fetchWithTimeout(`${BACKEND_ORIGIN}/api/projects/${encodeURIComponent(projectId)}`, {}, 10000);
    if (!res.ok) throw new Error();
    project = await res.json();
  } catch {
    errorState("Couldn't load this project — is the backend running?");
    return;
  }
  if (!project.paid) { errorState('This project has not been unlocked yet.'); return; }
  if (project.tier !== 'full') { errorState('The City Submission Pack is part of the Full Workspace — this project was unlocked at the Roadmap tier.'); return; }

  const docsRes = await fetchWithTimeout(`${BACKEND_ORIGIN}/api/projects/${encodeURIComponent(projectId)}/documents`, {}, 10000);
  const { documents } = docsRes.ok ? await docsRes.json() : { documents: [] };
  const byType = t => documents.find(d => d.docType === t);

  document.title = `City Submission Pack — ${project.location}`;

  app.innerHTML = `
    <div class="cover">
      <div class="kicker">${esc(project.companyName || 'City Submission Pack')}</div>
      <div class="title">City Submission Pack</div>
      <div class="projline">${esc(project.location)} &middot; ${esc(tradeLabel(project.trade))}</div>
    </div>
    <div class="body-pad">
      <div class="section">
        <h2>Permit narrative — submission draft</h2>
        <p style="white-space:pre-wrap;">${esc(project.narrative)}</p>
      </div>

      ${docSection('Gather-this checklist', byType('permit_checklist'))}
      ${docSection('Building department questions', byType('building_dept_questions'))}
      ${docSection('HOA questions', byType('hoa_questions'))}
      ${docSection('Inspection checklist', byType('inspection_checklist'))}

      <p class="honesty">This pack organizes your submission — it doesn't replace county confirmation. Requirements marked "commonly required" should be verified with the building department before filing. Portal links and phone numbers change; always use the county's official site.</p>

      ${project.whiteLabel ? '' : `<div class="footerline">Permit roadmap prepared with Setback &middot; ${esc(location.hostname)} &middot; Every permit, decoded in 60 seconds</div>`}
    </div>
  `;
}

document.getElementById('printBtn').onclick = () => {
  logEvent('submission_pack_downloaded', { projectId });
  window.print();
};
load();
</script>
</body>
</html>
