<div id="root"></div>
<script>
// ============================================================
// WAKE — Waterfront Approval & Knowledge Engine
// AI-powered marine permit intelligence (working prototype)
// ============================================================

// In-memory "knowledge network" counter — represents the data
// flywheel. In production this lives in a shared database; here it
// demonstrates the mechanic (no browser storage used).
let NETWORK = { reports: 1247, contributors: 312 };

const root = document.getElementById('root');

const STYLE = `
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background:#0b1220; }
  #wake { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
    color:#e2e8f0; max-width: 920px; margin: 0 auto; padding: 28px 20px 60px; }
  .brandrow { display:flex; align-items:center; gap:12px; margin-bottom:6px; }
  .logo { width:40px; height:40px; border-radius:9px;
    background: linear-gradient(135deg,#0891b2,#0e7490); position:relative; flex:none; }
  .logo:before { content:''; position:absolute; left:7px; right:7px; top:50%;
    height:3px; background:#e0f2fe; border-radius:3px;
    box-shadow:0 6px 0 #7dd3fc, 0 -6px 0 #38bdf8; }
  h1 { font-size:26px; font-weight:800; letter-spacing:-0.5px; color:#f8fafc; }
  .tag { color:#67e8f9; font-size:13px; font-weight:600; letter-spacing:0.5px; }
  .sub { color:#94a3b8; font-size:15px; line-height:1.6; margin:14px 0 22px; max-width:680px; }
  .netbar { display:flex; gap:18px; margin-bottom:26px; flex-wrap:wrap; }
  .netpill { background:#0f1b2e; border:1px solid #1e3a5f; border-radius:10px;
    padding:10px 16px; }
  .netpill b { color:#22d3ee; font-size:18px; display:block; }
  .netpill span { color:#94a3b8; font-size:12px; }
  .card { background:#0f1b2e; border:1px solid #1e3a5f; border-radius:14px;
    padding:24px; margin-bottom:20px; }
  .card h2 { font-size:16px; color:#f1f5f9; margin-bottom:16px; font-weight:700; }
  label { display:block; font-size:12px; color:#94a3b8; margin:0 0 6px;
    font-weight:600; text-transform:uppercase; letter-spacing:0.4px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
  input, select, textarea { width:100%; background:#0b1626; border:1px solid #25406b;
    color:#e2e8f0; border-radius:9px; padding:11px 13px; font-size:14px;
    font-family:inherit; margin-bottom:16px; }
  input:focus, select:focus, textarea:focus { outline:none; border-color:#0891b2; }
  textarea { resize:vertical; min-height:64px; }
  .btn { background:linear-gradient(135deg,#0891b2,#0e7490); color:#fff; border:none;
    border-radius:10px; padding:14px 22px; font-size:15px; font-weight:700;
    cursor:pointer; width:100%; transition:transform .08s; }
  .btn:hover { transform:translateY(-1px); }
  .btn:disabled { opacity:.55; cursor:not-allowed; transform:none; }
  .out { display:none; }
  .out.show { display:block; }
  .secLabel { font-size:11px; color:#22d3ee; text-transform:uppercase;
    letter-spacing:1px; font-weight:700; margin-bottom:10px; }
  .agency { background:#0b1626; border:1px solid #25406b; border-left:3px solid #0891b2;
    border-radius:8px; padding:13px 15px; margin-bottom:10px; }
  .agency b { color:#f1f5f9; font-size:14px; }
  .agency p { color:#94a3b8; font-size:13px; line-height:1.55; margin-top:4px; }
  .flag { background:#1a1408; border:1px solid #5b4514; border-left:3px solid #eab308;
    border-radius:8px; padding:12px 15px; margin-bottom:9px; color:#fde68a; font-size:13px;
    line-height:1.55; }
  .risk { background:#1a0c0c; border:1px solid #5b1a1a; border-left:3px solid #ef4444;
    border-radius:8px; padding:12px 15px; margin-bottom:9px; color:#fca5a5; font-size:13px;
    line-height:1.55; }
  .timeline { display:flex; align-items:baseline; gap:10px; margin-bottom:6px; }
  .timeline b { color:#34d399; font-size:22px; }
  .timeline span { color:#94a3b8; font-size:13px; }
  .narrative { background:#0b1626; border:1px solid #25406b; border-radius:8px;
    padding:16px; color:#cbd5e1; font-size:13.5px; line-height:1.7; white-space:pre-wrap; }
  .copybtn { background:#1e3a5f; color:#cbd5e1; border:none; border-radius:7px;
    padding:7px 13px; font-size:12px; cursor:pointer; margin-top:10px; font-weight:600; }
  .spinner { display:inline-block; width:16px; height:16px; border:2px solid #ffffff55;
    border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite;
    vertical-align:middle; margin-right:8px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .report { background:#0a1f1a; border:1px solid #14543f; border-radius:12px;
    padding:18px; margin-top:8px; }
  .report h3 { color:#6ee7b7; font-size:14px; margin-bottom:10px; }
  .rbtns { display:flex; gap:10px; flex-wrap:wrap; }
  .rbtn { flex:1; min-width:120px; background:#0b1626; border:1px solid #25406b;
    color:#cbd5e1; border-radius:8px; padding:11px; font-size:13px; cursor:pointer;
    font-weight:600; }
  .rbtn:hover { border-color:#0891b2; }
  .disc { color:#64748b; font-size:11.5px; line-height:1.6; margin-top:24px;
    text-align:center; padding:0 10px; }
  .err { color:#fca5a5; background:#1a0c0c; border:1px solid #5b1a1a; border-radius:8px;
    padding:12px; font-size:13px; margin-top:14px; }
  @media (max-width:640px){ .grid2,.grid3{ grid-template-columns:1fr; } }
`;

function render() {
  root.innerHTML = `
  <style>${STYLE}</style>
  <div id="wake">
    <div class="brandrow">
      <div class="logo"></div>
      <div>
        <h1>WAKE</h1>
        <div class="tag">Every marine permit, decoded.</div>
      </div>
    </div>
    <p class="sub">
      Tell WAKE about your dock, seawall, or lift project. In seconds it maps every
      agency you'll answer to, the jurisdiction-specific rules that trip people up,
      a draft permit narrative, a realistic timeline, and the exact reasons projects
      like yours get rejected — so you don't lose weeks to a resubmittal.
    </p>

    <div class="netbar">
      <div class="netpill"><b id="net-reports">${NETWORK.reports.toLocaleString()}</b>
        <span>permit outcomes in the network</span></div>
      <div class="netpill"><b id="net-contrib">${NETWORK.contributors}</b>
        <span>contributing contractors</span></div>
    </div>

    <div class="card">
      <h2>Project details</h2>
      <div class="grid2">
        <div><label>State</label>
          <input id="f-state" value="Florida" placeholder="e.g. Florida"></div>
        <div><label>County / Municipality</label>
          <input id="f-county" placeholder="e.g. St. Johns County"></div>
      </div>
      <div class="grid2">
        <div><label>Waterbody type</label>
          <select id="f-water">
            <option>Tidal / saltwater (Intracoastal, bay, ocean)</option>
            <option>Brackish tidal canal</option>
            <option>Freshwater lake</option>
            <option>Freshwater river</option>
            <option>Navigable federal waterway</option>
          </select></div>
        <div><label>Project type</label>
          <select id="f-type">
            <option>New dock / pier</option>
            <option>Dock repair / replacement</option>
            <option>New seawall</option>
            <option>Seawall repair / replacement</option>
            <option>Boat lift install</option>
            <option>Boathouse</option>
            <option>Riprap / living shoreline</option>
          </select></div>
      </div>
      <div class="grid3">
        <div><label>Approx. size</label>
          <input id="f-size" placeholder="e.g. 500 sq ft / 80 lin ft"></div>
        <div><label>New or existing structure?</label>
          <select id="f-new">
            <option>Brand new structure</option>
            <option>Replacing existing (same footprint)</option>
            <option>Replacing existing (expanding)</option>
          </select></div>
        <div><label>Material</label>
          <input id="f-mat" placeholder="e.g. vinyl, concrete, composite"></div>
      </div>
      <label>Site conditions / anything special (optional)</label>
      <textarea id="f-notes" placeholder="e.g. seagrass nearby, mangroves on shoreline, neighbor's dock close, high-erosion zone, manatee area, prior permit history..."></textarea>
      <button class="btn" id="go">Generate permit roadmap</button>
      <div id="errbox"></div>
    </div>

    <div class="out" id="out"></div>

    <p class="disc">
      WAKE produces a draft roadmap to review with your engineer and the permitting
      authorities — it is not legal advice and does not replace official agency
      determinations. Always confirm current requirements with the issuing agencies
      before submitting. Accuracy improves as contractors report real outcomes back
      to the network.
    </p>
  </div>`;

  document.getElementById('go').onclick = generate;
}

async function generate() {
  const v = id => (document.getElementById(id).value || '').trim();
  const project = {
    state: v('f-state'), county: v('f-county'), water: v('f-water'),
    type: v('f-type'), size: v('f-size'), isnew: v('f-new'),
    material: v('f-mat'), notes: v('f-notes')
  };
  if (!project.state || !project.county) {
    document.getElementById('errbox').innerHTML =
      `<div class="err">Add at least a state and county so WAKE can map the right jurisdictions.</div>`;
    return;
  }
  document.getElementById('errbox').innerHTML = '';
  const btn = document.getElementById('go');
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span>Mapping agencies & rules...`;

  const sys = `You are WAKE, an expert marine-construction permitting analyst for U.S. waterfront projects (docks, seawalls, boat lifts, boathouses, shoreline stabilization). You know how local (county/municipal), state (e.g. FDEP and water management districts in Florida), and federal (US Army Corps of Engineers, and the agencies it coordinates with such as Fish & Wildlife and NMFS) jurisdictions overlap for residential marine work.

Given a project, return a permitting roadmap. Be specific to the jurisdiction named. If you are not certain a specific local rule applies, say it generally and flag that it must be confirmed locally rather than inventing a precise number. Never fabricate a specific statute citation you are unsure of.

Respond with ONLY valid JSON (no markdown, no preamble), in exactly this shape:
{
 "agencies":[{"name":"agency / permit name","detail":"what they review and what's required, 1-2 sentences"}],
 "flags":["jurisdiction-specific rule or gotcha that commonly applies here"],
 "risks":["a specific reason a project like this gets rejected or delayed, and how to avoid it"],
 "timeline":"realistic range e.g. '8-14 weeks before construction'",
 "timelineNote":"one sentence on what drives the range",
 "narrative":"a 120-180 word draft project description / cover narrative the contractor can adapt for the permit application, written professionally in first person plural"
}
Keep agencies to the 3-6 that actually apply. Keep flags and risks to the 3-5 most relevant each.`;

  const user = `Project:
- Location: ${project.county}, ${project.state}
- Waterbody: ${project.water}
- Type: ${project.type}
- Size: ${project.size || 'not specified'}
- New/existing: ${project.isnew}
- Material: ${project.material || 'not specified'}
- Site notes: ${project.notes || 'none provided'}`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 2000,
        messages: [{ role: "user", content: user }],
        system: sys
      })
    });
    const data = await res.json();
    let text = (data.content || [])
      .filter(b => b.type === "text").map(b => b.text).join("\n").trim();
    // strip code fences / isolate JSON
    text = text.replace(/```json/gi, '').replace(/```/g, '').trim();
    const s = text.indexOf('{'), e = text.lastIndexOf('}');
    if (s > -1 && e > -1) text = text.slice(s, e + 1);
    const r = JSON.parse(text);
    renderOut(r, project);
  } catch (err) {
    document.getElementById('errbox').innerHTML =
      `<div class="err">Something interrupted the engine: ${String(err)}. Try again in a moment.</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Generate permit roadmap';
  }
}

function esc(s){ return String(s||'').replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function renderOut(r, project) {
  const out = document.getElementById('out');
  const agencies = (r.agencies||[]).map(a =>
    `<div class="agency"><b>${esc(a.name)}</b><p>${esc(a.detail)}</p></div>`).join('');
  const flags = (r.flags||[]).map(f => `<div class="flag">⚑ ${esc(f)}</div>`).join('');
  const risks = (r.risks||[]).map(x => `<div class="risk">✕ ${esc(x)}</div>`).join('');

  out.innerHTML = `
    <div class="card">
      <div class="secLabel">Roadmap for ${esc(project.type)} · ${esc(project.county)}, ${esc(project.state)}</div>
      <h2 style="margin-bottom:8px;">Agencies & permits you'll answer to</h2>
      ${agencies || '<p style="color:#94a3b8;font-size:13px">No agencies returned — try adding more detail.</p>'}
    </div>

    ${flags ? `<div class="card"><div class="secLabel">Jurisdiction flags — the local rules that trip people up</div>${flags}</div>`:''}

    ${risks ? `<div class="card"><div class="secLabel">Rejection risks — fix these before you submit</div>${risks}</div>`:''}

    <div class="card">
      <div class="secLabel">Realistic timeline</div>
      <div class="timeline"><b>${esc(r.timeline||'—')}</b></div>
      <span style="color:#94a3b8;font-size:13px">${esc(r.timelineNote||'')}</span>
    </div>

    <div class="card">
      <div class="secLabel">Draft permit narrative — adapt &amp; submit</div>
      <div class="narrative" id="narr">${esc(r.narrative||'')}</div>
      <button class="copybtn" id="copy">Copy narrative</button>
    </div>

    <div class="card">
      <div class="report">
        <h3>Close the loop — make WAKE smarter for the next contractor</h3>
        <p style="color:#94a3b8;font-size:13px;line-height:1.6;margin-bottom:13px;">
          When your permit comes back, tell WAKE what happened. Every real outcome
          sharpens the roadmap for everyone working in ${esc(project.county)} —
          this is the network that no competitor can copy.</p>
        <div class="rbtns">
          <button class="rbtn" data-o="approved">✓ Approved as drafted</button>
          <button class="rbtn" data-o="comments">↻ Approved after comments</button>
          <button class="rbtn" data-o="rejected">✕ Rejected — needed changes</button>
        </div>
        <div id="thanks"></div>
      </div>
    </div>`;

  out.classList.add('show');
  out.scrollIntoView({ behavior:'smooth', block:'start' });

  document.getElementById('copy').onclick = () => {
    const t = document.getElementById('narr').innerText;
    navigator.clipboard && navigator.clipboard.writeText(t);
    document.getElementById('copy').innerText = 'Copied ✓';
    setTimeout(()=>{ const c=document.getElementById('copy'); if(c) c.innerText='Copy narrative'; }, 1600);
  };

  out.querySelectorAll('.rbtn').forEach(b => b.onclick = () => {
    NETWORK.reports += 1; NETWORK.contributors += 1;
    document.getElementById('net-reports').innerText = NETWORK.reports.toLocaleString();
    document.getElementById('net-contrib').innerText = NETWORK.contributors;
    document.getElementById('thanks').innerHTML =
      `<p style="color:#6ee7b7;font-size:13px;margin-top:13px;">
        Logged. That's one more real outcome the next contractor in
        ${esc(project.county)} gets to learn from. This is how the moat compounds.</p>`;
  });
}

render();
</script>
